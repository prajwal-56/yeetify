<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeetify | YEET ! Your files </title>
</head>
<body>
    <h1> yeet !</h1>
    <img src="attachments/yeet-skit.gif" alt="Timothe and someone else SNL - yeet.gif">

    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file"> 
        <button type="submit"> YEET ! </button>

    </form>

    <div id="file-list">

    </div>

    <script>
        async function render_file_list(){
            const response = await fetch("/uploads")
            const response_json = await response.json()

            console.log(response_json)

            const fileList_container = document.getElementById('file-list')

            const files_ul = document.createElement('ul');

            response_json.forEach(filename => {
                const li = document.createElement('li');
                const link = document.createElement('a');
                link.href = `/download/${filename}`;
                link.textContent = filename;
                link.setAttribute('download' , filename);

                li.append(link);
                files_ul.append(li)
            });

            fileList_container.append(files_ul);
        }

        render_file_list();
    </script>
</body>
</html>
